# --- Hyprland Configuration ---

# 1. Variables
$fileManager = thunar
$menu = wofi --show drun --allow-images
$mainMod = SUPER

# 2. Monitors
# Monitor setup: Name, Resolution, Position, Scale
$monitor1 = DP-6
$monitor1Resolution = 3440x1440@165
$monitor2 = HDMI-A-2
$monitor2Resolution = 3840x2160@60
$monitorPosition = auto

monitor = HDMI-A-2, preferred, auto, 2.4

# 3. Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 4. Input
input {
    kb_layout = br
}

# 5. General & Decoration
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7dcfffff)
}

decoration {
    rounding = 8
}

animations {
    enabled = yes
}

# 6. Environment Variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEO_DRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

# 7. Keybindings

# General actions
bind = $mainMod, Escape, exec, killall waybar || waybar
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, toggleFloating
bind = $mainMod, A, exec, $menu
bind = $mainMod, Q, killactive
bind = $mainMod, X, exit
bind = $mainMod, M, fullscreen
bind = $mainMod, F5, exec, hyprctl reload
bind = $mainMod, S, exec, steam
bind = $mainMod, I, exec, firefox

# Monitor management
bind = $mainMod, F1, exec, hyprctl keyword monitor "$monitor1,$monitor1Resolution,$monitorPosition,1"
bind = $mainMod, F2, exec, hyprctl keyword monitor "$monitor1,disabled"
bind = $mainMod, F3, exec, hyprctl keyword monitor "$monitor2,$monitor1Resolution,$monitorPosition,2.4"
bind = $mainMod, F4, exec, hyprctl keyword monitor "$monitor2,disabled"

# Window navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d 

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10 

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 

# Move focused window
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Zoom controls
bind = SUPER, equal, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor -j | jq '.float') + 0.5}")
bind = SUPER, minus, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {z=$(hyprctl getoption cursor:zoom_factor -j | jq '.float') - 0.5; if (z < 1) z=1; print z}")
bind = SUPER, 0, exec, hyprctl keyword cursor:zoom_factor 1

# Media controls
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop

# Screenshot
bind = SUPER SHIFT, S, exec, mkdir -p ~/Images && grim -g "$(slurp)" ~/Images/$(date +%Y-%m-%d-%H-%M-%S)-screenshot.png
